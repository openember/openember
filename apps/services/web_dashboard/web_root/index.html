<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenEmber Dashboard (Layui Demo)</title>
    <link rel="icon" href="assets/logo.png" type="image/png" />

    <!--
      Layui 适合嵌入式场景的原因：
      - 原生 HTML/CSS/JS 方式使用，不依赖 Node/Vite/Webpack 构建链
      - 可直接使用 CDN（开发方便），也可把静态资源离线打包到 web_root（量产）

      文档： https://layui.dev/docs/2/
      这里先用 CDN 快速演示；后续如需离线部署，可把 layui 的 dist 目录放到 web_root/layui 并改成本地引用。
    -->
    <link href="https://unpkg.com/layui@2.13.5/dist/css/layui.css" rel="stylesheet" />
    <style>
      :root {
        --oe-primary: #ff7a00;
        --oe-primary-2: #ffb703;
        /* Layui global primary color (avoid default teal flash) */
        --layui-color-primary: var(--oe-primary);
      }

      body { background: #f6f7fb; }
      .oe-card-title { display: flex; justify-content: space-between; align-items: center; }
      .oe-muted { color: rgba(0,0,0,.55); }
      .oe-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .oe-kv { display: grid; grid-template-columns: 140px 1fr; gap: 6px 12px; }
      .oe-log { height: 220px; overflow: auto; background: #0b1020; color: #d6e0ff; padding: 12px; border-radius: 8px; }
      .oe-badge-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:8px; vertical-align:middle; }

      /* Orange theme overrides (minimal, no rebuild toolchain) */
      .layui-header { background: var(--oe-primary); }
      .layui-layout-admin .layui-logo { color: #fff; font-weight: 600; }
      .layui-nav .layui-nav-item a { color: #fff; }
      .layui-nav .layui-nav-item a:hover { color: #fff; }
      .layui-nav .layui-this:after, .layui-nav-bar { background-color: var(--oe-primary-2) !important; }
      .layui-btn { background-color: var(--oe-primary); }
      .layui-btn:hover { background-color: #ff8f2b; }
      .layui-btn-primary { background-color: transparent; border-color: rgba(255,255,255,.55); color: #fff; }
      .layui-btn-primary:hover { border-color: #fff; color: #fff; }
      .layui-border-blue { border-color: var(--oe-primary) !important; }

      /* Side nav selected item (layui-nav-tree) */
      .layui-nav-tree .layui-nav-item a {
        transition: none !important;
      }
      .layui-nav-tree .layui-nav-item a:hover {
        background-color: rgba(255, 122, 0, 0.12) !important;
        color: #fff !important;
      }
      .layui-nav-tree .layui-this > a,
      .layui-nav-tree .layui-this > a:hover {
        background-color: var(--oe-primary) !important;
        color: #fff !important;
      }
      .layui-nav-tree .layui-nav-bar {
        background-color: var(--oe-primary) !important;
      }
      .layui-nav-tree .layui-nav-itemed > a,
      .layui-nav-tree .layui-nav-itemed > a:hover {
        background-color: rgba(255, 122, 0, 0.12) !important;
        color: #fff !important;
      }
    </style>
  </head>
  <body>
    <div class="layui-layout layui-layout-admin">
      <div class="layui-header">
        <div class="layui-logo" style="display:flex; align-items:center; gap:10px;">
          <img src="assets/logo.png" alt="OpenEmber" style="width:26px; height:26px; margin-left:10px;" />
          <span>OpenEmber</span>
        </div>
        <ul class="layui-nav layui-layout-left">
          <li class="layui-nav-item layui-this"><a href="javascript:;">Dashboard</a></li>
          <li class="layui-nav-item"><a href="javascript:;">System</a></li>
          <li class="layui-nav-item"><a href="javascript:;">Modules</a></li>
        </ul>
        <ul class="layui-nav layui-layout-right">
          <li class="layui-nav-item">
            <a href="javascript:;">
              <span class="oe-badge-dot" id="dotConn"></span>
              <span id="txtConn">Disconnected</span>
            </a>
          </li>
        </ul>
      </div>

      <div class="layui-side layui-bg-black">
        <div class="layui-side-scroll">
          <ul class="layui-nav layui-nav-tree" lay-filter="nav">
            <li class="layui-nav-item layui-this"><a href="javascript:;" data-page="overview">概览</a></li>
            <li class="layui-nav-item"><a href="javascript:;" data-page="logs">日志</a></li>
            <li class="layui-nav-item"><a href="javascript:;" data-page="about">关于</a></li>
          </ul>
        </div>
      </div>

      <div class="layui-body" style="padding: 16px;">
        <div class="layui-row layui-col-space16">
          <div class="layui-col-md8">
            <div class="layui-card">
              <div class="layui-card-header">
                <div class="oe-card-title">
                  <span>设备概览</span>
                  <div>
                    <button class="layui-btn layui-btn-sm" id="btnRefresh">刷新</button>
                    <button class="layui-btn layui-btn-sm layui-btn-primary" id="btnToggleTheme">切换浅/深</button>
                  </div>
                </div>
              </div>
              <div class="layui-card-body">
                <div class="oe-kv">
                  <div class="oe-muted">OS</div><div class="oe-mono" id="kvOS">--</div>
                  <div class="oe-muted">Host</div><div class="oe-mono" id="kvHost">--</div>
                  <div class="oe-muted">Kernel</div><div class="oe-mono" id="kvKernel">--</div>
                  <div class="oe-muted">Uptime</div><div class="oe-mono" id="kvUptime">--</div>
                  <div class="oe-muted">CPU</div><div class="oe-mono" id="kvCPU">--</div>
                  <div class="oe-muted">GPU</div><div class="oe-mono" id="kvGPU">--</div>
                  <div class="oe-muted">Memory</div><div class="oe-mono" id="kvMem">--</div>
                  <div class="oe-muted">Web root</div><div class="oe-mono" id="kvWebRoot">/</div>
                  <div class="oe-muted">HTTP</div><div class="oe-mono" id="kvHttp">0.0.0.0:8000</div>
                </div>
                <hr class="layui-border-blue" />
                <div class="layui-progress layui-progress-big" lay-showpercent="true">
                  <div class="layui-progress-bar" lay-percent="0%" id="barCpu"></div>
                </div>
                <div class="layui-progress layui-progress-big" lay-showpercent="true" style="margin-top: 10px;">
                  <div class="layui-progress-bar layui-bg-orange" lay-percent="0%" id="barMem"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="layui-col-md4">
            <div class="layui-card">
              <div class="layui-card-header">模块状态（示例）</div>
              <div class="layui-card-body">
                <table class="layui-table" lay-size="sm">
                  <thead>
                    <tr>
                      <th>模块</th>
                      <th>状态</th>
                      <th class="layui-hide-xs">PID</th>
                    </tr>
                  </thead>
                  <tbody id="tblMods"></tbody>
                </table>
                <div class="oe-muted">说明：当前为前端 mock 数据，后续可接 `/api/*` 或消息总线桥接。</div>
              </div>
            </div>
          </div>

          <div class="layui-col-md12">
            <div class="layui-card">
              <div class="layui-card-header">运行日志（示例）</div>
              <div class="layui-card-body">
                <div class="oe-log oe-mono" id="logBox"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="layui-footer">OpenEmber · Layui demo page</div>
    </div>

    <script src="https://unpkg.com/layui@2.13.5/dist/layui.js"></script>
    <script>
      (function () {
        // IMPORTANT:
        // Do not depend on Layui initialization for core data fetching.
        // If CDN is blocked/offline, layui.use() won't run and the page would never request /api/system.

        function hasLayui() {
          return typeof window.layui !== 'undefined' && window.layui && typeof window.layui.use === 'function';
        }

        var element = null;
        var layer = null;

        if (hasLayui()) {
          window.layui.use(function () {
            element = window.layui.element || null;
            layer = window.layui.layer || null;
          });
        }

        var isDark = false;

        function setConn(ok) {
          var dot = document.getElementById('dotConn');
          var txt = document.getElementById('txtConn');
          dot.style.background = ok ? '#16b777' : '#ff5722';
          txt.textContent = ok ? 'Connected' : 'Disconnected';
        }

        function log(line) {
          var box = document.getElementById('logBox');
          var ts = new Date().toISOString().replace('T', ' ').replace('Z', '');
          box.textContent += '[' + ts + '] ' + line + '\n';
          box.scrollTop = box.scrollHeight;
        }

        function httpGetJson(url, cb) {
          if (typeof fetch === 'function') {
            fetch(url, { cache: 'no-store' })
              .then(function (resp) {
                if (!resp.ok) throw new Error('http ' + resp.status);
                return resp.json();
              })
              .then(function (j) { cb(null, j); })
              .catch(function (e) { cb(e, null); });
            return;
          }
          // Fallback for very old browsers
          try {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function () {
              if (xhr.readyState !== 4) return;
              if (xhr.status >= 200 && xhr.status < 300) {
                try {
                  cb(null, JSON.parse(xhr.responseText));
                } catch (e) {
                  cb(e, null);
                }
              } else {
                cb(new Error('http ' + xhr.status), null);
              }
            };
            xhr.send();
          } catch (e) {
            cb(e, null);
          }
        }

        function rand(min, max) {
          return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function renderModules() {
          var rows = [
            { name: 'log_service', st: 'RUN', pid: 1024 },
            { name: 'config_service', st: 'RUN', pid: 1033 },
            { name: 'device_manager', st: 'RUN', pid: 1041 },
            { name: 'health_monitor', st: 'RUN', pid: 1048 },
            { name: 'web_dashboard', st: 'RUN', pid: 1056 }
          ];
          var html = rows.map(function (r) {
            var badge = r.st === 'RUN'
              ? '<span class="layui-badge layui-bg-green">RUN</span>'
              : '<span class="layui-badge">UNK</span>';
            return '<tr><td>' + r.name + '</td><td>' + badge + '</td><td class="layui-hide-xs oe-mono">' + r.pid + '</td></tr>';
          }).join('');
          document.getElementById('tblMods').innerHTML = html;
        }

        function refreshSystem(done) {
          httpGetJson('/api/system', function (err, j) {
            if (err) {
              setConn(false);
              log('system fetch failed: ' + (err && err.message ? err.message : err));
              if (done) done(err);
              return;
            }
            document.getElementById('kvOS').textContent = (j.os || '--') + (j.arch ? (' ' + j.arch) : '');
            document.getElementById('kvHost').textContent = j.host || '--';
            document.getElementById('kvKernel').textContent = j.kernel || '--';
            document.getElementById('kvUptime').textContent = j.uptime || '--';
            document.getElementById('kvCPU').textContent = j.cpu || '--';
            document.getElementById('kvGPU').textContent = j.gpu || '--';
            document.getElementById('kvMem').textContent = j.memory || '--';
            setConn(true);
            log('system ok: ' + (j.os || 'unknown') + ' | ' + (j.kernel || 'unknown'));
            if (done) done(null);
          });
        }

        function refreshMockMeters() {
          var cpu = rand(3, 68);
          var mem = rand(8, 84);
          document.getElementById('barCpu').setAttribute('lay-percent', cpu + '%');
          document.getElementById('barMem').setAttribute('lay-percent', mem + '%');
          if (element && typeof element.render === 'function') {
            element.render('progress');
          }
          log('refresh cpu=' + cpu + '% mem=' + mem + '%');
        }

        function refresh() {
          document.getElementById('kvWebRoot').textContent = location.pathname.replace(/\/[^\/]*$/, '/') || '/';
          document.getElementById('kvHttp').textContent = location.host || '0.0.0.0:8000';
          refreshSystem(function () {
            renderModules();
            refreshMockMeters();
          });
        }

        document.getElementById('btnRefresh').addEventListener('click', function () {
          refresh();
          if (layer && typeof layer.msg === 'function') {
            layer.msg('已刷新', { icon: 1, time: 800 });
          }
        });

        document.getElementById('btnToggleTheme').addEventListener('click', function () {
          isDark = !isDark;
          document.body.style.background = isDark ? '#0f1226' : '#f6f7fb';
          if (layer && typeof layer.msg === 'function') {
            layer.msg(isDark ? '深色背景（示例）' : '浅色背景（示例）', { time: 900 });
          }
        });

        function start() {
          setConn(false);
          log('dashboard loaded (Layui ' + (hasLayui() ? 'available' : 'missing') + ')');
          refresh();
          setInterval(refresh, 2000);
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', start);
        } else {
          start();
        }
      })();
    </script>
  </body>
</html>
